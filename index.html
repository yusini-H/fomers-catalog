<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOMERS 통합 카탈로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    :root{
      --paper:#ECE7DA;
      --paper-dim:#E1DBCA;
      --ink:#1B2A38;
    --ink-2:#243B4D;
    --ink-3:#2E4258;
    --line:#B9B0A2;
          --amber:#D9910C;
          --amber-dark:#8A5A06;
    --teal:#2B6E63;
    --teal-dark:#173D36;
    --rust:#B23A2E;
          --rust-dark:#6E231C;
}
  *{box-sizing:border-box;}
  body{
        margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans KR','IBM Plex Sans',sans-serif;
}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .titleblock{
        background:var(--ink);
    color:var(--paper);
    padding:20px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:4px solid var(--amber);
    flex-wrap:wrap;
    gap:10px;
}
  .wordmark{
        font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:24px;
    letter-spacing:2px;
    display:flex;
    align-items:baseline;
    gap:10px;
}
  .wordmark span{
        font-family:'IBM Plex Mono',monospace;
    font-weight:400;
    font-size:11px;
    letter-spacing:1px;
    color:#9FB2C2;
    text-transform:uppercase;
}
  .stamp{
        font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#9FB2C2;
    text-align:right;
    line-height:1.6;
    border-left:1px solid #3A5064;
    padding-left:16px;
}

  .spacebar{
        background:var(--ink-2);
    color:var(--paper);
    padding:14px 28px;
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--ink-3);
  }
  .spacebar label{
        font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#9FB2C2;
    white-space:nowrap;
}
  .spacebar input[type=text]{
        background:var(--ink-3);
    border:1px solid #3A5064;
    color:var(--paper);
    font-family:'IBM Plex Sans KR',sans-serif;
    font-size:13px;
    padding:7px 10px;
    outline:none;
  }
  .spacebar input[type=text]:focus{border-color:var(--amber);}
  #buildingInput{width:200px;}
      .room-chips{
        display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
}
  .room-chip{
        font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:7px 10px;
    background:var(--ink-3);
    color:#C9D7E2;
        border:1px solid #3A5064;
    cursor:pointer;
    white-space:nowrap;
}
  .room-chip.active{
    background:var(--amber);
    color:var(--ink);
    border-color:var(--amber);
    font-weight:600;
  }
  .room-chip .x{
    margin-left:6px;
    color:#8CA0B0;
  }
  .room-chip.active .x{color:var(--ink);}
  .room-chip.pending-remove{background:var(--rust);color:#fff;border-color:var(--rust-dark);}
    .room-chip.pending-remove .x{color:#fff;font-weight:600;}
    .add-room-form{
          display:flex;
    gap:6px;
    align-items:center;
                                }
  .add-room-form input{width:64px;}
  .add-room-form input.roomname{width:100px;}
  .add-room-btn{
        font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    padding:8px 12px;
    background:var(--teal);
    color:#EFF7F4;
        border:none;
    cursor:pointer;
}
  .add-room-btn:hover{background:var(--teal-dark);}
  .active-note{
        margin-left:auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--amber);
    white-space:nowrap;
}

  .layout{
    max-width:1560px;
    margin:0 auto;
    padding:24px 24px 90px;
    display:flex;
    gap:24px;
    align-items:flex-start;
  }
  .layout-left{
    flex:1;
    min-width:0;
  }
  .layout-right{
    width:460px;
    flex:none;
    position:sticky;
    top:20px;
  }
  @media (max-width:1100px){
    .layout{flex-direction:column;}
    .layout-right{width:100%;position:static;}
  }

  .toolbar{
        display:flex;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
}
  .search-wrap{
        position:relative;
    flex:1;
    min-width:220px;
}
  .search-wrap input{
        width:100%;
    padding:11px 14px 11px 36px;
    border:1.5px solid var(--ink);
    background:#fff;
        font-family:'IBM Plex Sans KR',sans-serif;
    font-size:14px;
    color:var(--ink);
    outline:none;
}
  .search-wrap input:focus{border-color:var(--amber);}
  .search-wrap::before{
        content:"";
    position:absolute;
    left:12px;
    top:50%;
    width:14px;
    height:14px;
    transform:translateY(-50%);
    border:1.5px solid var(--ink-3);
    border-radius:50%;
}
  .search-wrap::after{
        content:"";
    position:absolute;
    left:22px;
    top:63%;
    width:6px;
    height:1.5px;
    background:var(--ink-3);
    transform:rotate(45deg);
}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-pill{
        font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:9px 14px;
    border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    letter-spacing:.3px;
}
  .filter-pill.active{background:var(--ink);color:var(--paper);}

  .count-line{
        font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-3);
    margin:0 0 14px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px dashed var(--line);
    padding-bottom:8px;
}

  .grid{
        display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:14px;
    margin-bottom:44px;
    }

  .ticket{
        background:#fff;
            border:1.5px solid var(--ink);
    position:relative;
    padding:12px 12px 12px;
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .ticket::before{
        content:"";
    position:absolute;
    top:-1.5px;
    right:16px;
    width:10px;
    height:10px;
    background:var(--paper);
    border:1.5px solid var(--ink);
    border-top:none;
    border-radius:0 0 8px 8px;
  }
  .ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
  .ticket-code{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--amber-dark);font-weight:600;}
  .ticket-g2b{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);}
  .ticket-body{display:flex;gap:10px;}
  .thumb{
        width:44px;height:44px;flex:none;
    border:1px solid var(--line);
    background:var(--paper-dim);
    display:flex;align-items:center;justify-content:center;
}
  .thumb svg{width:20px;height:20px;stroke:var(--ink-3);}
  .ticket-name{font-size:15px;font-weight:600;margin:0;line-height:1.3;}
  .ticket-spec{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);line-height:1.5;}
  .ticket-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .badge-pill{
        font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
    padding:2px 6px;border:1px solid var(--teal);color:var(--teal-dark);background:var(--paper);
    white-space:nowrap;
}
  .badge-div{border-color:var(--ink-3);color:var(--ink-2);}
  .badge-excl{border-color:var(--amber);color:var(--amber-dark);}
  .badge-sme{border-color:var(--teal);color:var(--teal-dark);}
  .badge-cert{border-color:#4C7EA8;color:#2E4E68;}
  .badge-contract{border-color:var(--rust);color:var(--rust-dark);}
  .ticket-bottom{
        display:flex;justify-content:space-between;align-items:center;
    border-top:1px dashed var(--line);padding-top:9px;margin-top:1px;
}
  .ticket-price{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;}
  .ticket-price span{font-size:10.5px;color:var(--ink-3);font-weight:400;margin-right:2px;}
  .add-btn{
        font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;
    padding:7px 11px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;
}
  .add-btn:hover{background:var(--teal-dark);}
  .add-btn:active{transform:scale(.97);}

  .quote-head{
        display:flex;justify-content:space-between;align-items:flex-end;
    border-top:4px solid var(--amber);padding-top:16px;margin-bottom:14px;
    flex-wrap:wrap;gap:10px;
}
  .quote-head h2{
        font-family:'Archivo',sans-serif;font-size:19px;font-weight:800;
    letter-spacing:.5px;margin:0;
}
  .quote-stats{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{
        background:var(--ink);color:var(--paper);padding:8px 14px;
    font-family:'IBM Plex Mono',monospace;
}
  .stat b{display:block;font-size:15px;font-weight:600;}
  .stat span{font-size:10px;color:#9FB2C2;}

  #quoteWrap{overflow-x:auto;}
  table.qtable{width:100%;min-width:640px;border-collapse:collapse;background:#fff;border:1.5px solid var(--ink);}
  @media screen{
    .layout-right .col-spec,
    .layout-right .col-g2b{ display:none; }
    .layout-right table.qtable{ min-width:0; }
  }
    table.qtable thead th{
        font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:.3px;color:var(--paper);
    background:var(--ink);padding:9px 8px;text-align:left;white-space:nowrap;
              }
  table.qtable td{
        padding:8px;font-size:13px;border-bottom:1px solid var(--paper-dim);vertical-align:middle;
  }
  .grp-floor td{
        background:var(--ink-2);color:var(--paper);font-family:'IBM Plex Mono',monospace;
    font-weight:600;font-size:12px;letter-spacing:.3px;padding:8px;
}
  .grp-room td{
        background:var(--paper-dim);font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;color:var(--ink-3);font-weight:600;padding:6px 8px;
}
  .row-code{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber-dark);}
  .row-g2b{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);}
  .row-price,.row-total{font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .row-total{font-weight:600;}
  .row-thumb{width:30px;height:30px;border:1px solid var(--line);background:var(--paper-dim);display:flex;align-items:center;justify-content:center;}
  .row-thumb svg{width:14px;height:14px;stroke:var(--ink-3);}
  .qty-ctrl{display:inline-flex;align-items:center;gap:6px;background:var(--paper-dim);padding:2px;}
  .qty-ctrl button{
        width:18px;height:18px;background:var(--ink-3);color:var(--paper);border:none;
    font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;line-height:1;
}
  .qty-ctrl span{font-family:'IBM Plex Mono',monospace;font-size:11.5px;min-width:16px;text-align:center;display:inline-block;}
  .row-remove{background:none;border:none;color:var(--rust);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  .row-remove:hover{color:var(--rust-dark);}
  .subtot-room td{
        background:#F4F1E8;font-family:'IBM Plex Mono',monospace;font-size:11.5px;
        color:var(--teal-dark);text-align:right;font-weight:600;padding:6px 8px;border-bottom:1px dashed var(--line);
}
  .subtot-floor td{
        background:#EADFC4;font-family:'IBM Plex Mono',monospace;font-size:12px;
        color:var(--amber-dark);text-align:right;font-weight:600;padding:7px 8px;
}
  tr.grand-total td{
        background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;
    font-size:15px;font-weight:600;text-align:right;padding:12px 8px;
}
  .empty-quote{
        padding:40px 20px;text-align:center;font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--ink-3);background:#fff;border:1.5px dashed var(--line);
    }
  .quote-note{
        font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-3);
    text-align:right;margin:8px 2px 0;
}

  .toast{
        position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;
    font-size:12px;padding:10px 18px;border-left:4px solid var(--amber);
    opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;z-index:50;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:700px){
    table.qtable{font-size:11px;}
    .qtable thead{display:none;}
    .count-line{flex-direction:column;align-items:flex-start;gap:4px;}
    .add-room-form input{width:auto;flex:1;min-width:0;}
    .toolbar select{flex:1;min-width:130px;}
}

  .admin-login-btn{
        display:flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.3px;
    color:#C9D7E2;
        background:var(--ink-3);
    border:1px solid #3A5064;
    padding:8px 12px;
    cursor:pointer;
    white-space:nowrap;
}
  .admin-login-btn:hover{background:var(--ink-2);color:var(--paper);border-color:var(--amber);}
  .admin-overlay{
        display:none;
    position:fixed;inset:0;
    background:rgba(27,42,56,0.72);
    z-index:900;
    align-items:center;justify-content:center;
    padding:20px;
}
  .admin-overlay.show{display:flex;}
  .admin-panel{
        background:#fff;
        border:1.5px solid var(--ink);
    width:100%;max-width:420px;
    padding:22px;
    position:relative;
}
  .admin-panel h3{
        font-family:'Archivo',sans-serif;font-size:16px;font-weight:800;
    margin:0 0 14px;letter-spacing:.3px;
    border-bottom:3px solid var(--amber);padding-bottom:10px;
}
  .admin-close{
        position:absolute;top:14px;right:14px;
    background:none;border:none;cursor:pointer;
    font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--ink-3);
}
  .admin-close:hover{color:var(--rust);}
  .admin-pin-row{display:flex;gap:8px;margin-top:6px;}
  .admin-pin-row input{
        flex:1;padding:10px 12px;border:1.5px solid var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;letter-spacing:2px;
}
  .admin-pin-row input:focus{border-color:var(--amber);}
  .admin-btn{
        font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;
    padding:9px 14px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;
}
  .admin-btn:hover{background:var(--teal-dark);}
  .admin-btn:disabled{opacity:.5;cursor:default;}
  .admin-btn.wide{width:100%;margin-top:14px;}
  .admin-stats{margin:4px 0 4px;}
  .admin-stat-row{
        display:flex;justify-content:space-between;
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:7px 0;border-bottom:1px dashed var(--line);color:var(--ink-3);
}
  .admin-stat-row b{color:var(--ink);font-weight:600;}
  .admin-url{
        font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-3);
    word-break:break-all;background:var(--paper-dim);padding:8px;margin-top:10px;
}

  .pagination{
        display:flex;align-items:center;justify-content:center;gap:10px;
    margin:-4px 0 44px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-3);
  }
  .pagination button{
        font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
    padding:8px 14px;border:1.5px solid var(--ink);background:#fff;color:var(--ink);cursor:pointer;
    }
  .pagination button:disabled{opacity:.35;cursor:default;}
  .pagination button:not(:disabled):hover{background:var(--ink);color:var(--paper);}

  .print-btn{
        font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;
    padding:8px 14px;background:var(--teal);color:#EFF7F4;border:none;cursor:pointer;
    }
  .print-btn:hover{background:var(--teal-dark);}
  .print-header{display:none;}

      @media print{
        .titleblock, .spacebar, .toolbar, .count-line, #grid, #pagination,
    .toast, #adminTrigger, #adminOverlay, #lockOverlay{ display:none !important; }
    .layout{ max-width:none; margin:0; padding:0; display:block; }
    .layout-right{ width:auto; position:static; }
    .print-header{ display:block; margin-bottom:18px; }
    .no-print{ display:none !important; }
    .qty-ctrl button, .row-remove{ display:none !important; }
    .quote-head{ border-top:none; }
      }
</style>
      </head>
      <body>

      <div class="titleblock">
        <div class="wordmark">FOMERS<span>다수공급자계약 통합 카탈로그</span></div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div class="stamp">계약처 · 조달청 나라장터<br>DOC NO. G2B-MAS-2026</div>
          <button class="admin-login-btn" id="adminTrigger" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="5" y="11" width="14" height="9" rx="1"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            관리자 로그인
          </button>
        </div>
      </div>

      <div class="spacebar">
        <label>현장명</label>
        <input type="text" id="buildingInput" placeholder="현장명을 입력하세요 (예: OO청사 리모델링)" class="mono">
        <div class="room-chips" id="roomChips"></div>
        <div class="add-room-form">
          <input type="text" id="newFloor" placeholder="층 (예 3층)" class="mono">
          <input type="text" id="newRoom" placeholder="실명 (예 교무실)" class="roomname mono">
          <button class="add-room-btn" id="addRoomBtn">+ 공간 추가</button>
        </div>
        <div class="active-note" id="activeNote"></div>
      </div>

      <div class="layout">

      <div class="layout-left">

        <div class="toolbar">
          <div class="search-wrap">
            <input id="searchInput" type="text" placeholder="품명 · 모델코드 · G2B번호 검색">
          </div>
          <div class="filters" id="filterBar"></div>
          <select id="certFilterSelect" class="filter-pill mono" style="cursor:pointer;">
      <option value="전체">인증구분 전체</option>
            <option value="우수조달">우수조달</option>
            <option value="중소기업자간경쟁제품">중소기업자간경쟁제품</option>
            <option value="여성기업">여성기업 인증</option>
            <option value="장애인기업">장애인기업 인증</option>
            <option value="환경표지">환경표지 인증</option>
            <option value="고효율기자재">고효율기자재</option>
          </select>
          <select id="sortSelect" class="filter-pill mono" style="cursor:pointer;">
      <option value="default">기본 정렬</option>
            <option value="price_asc">가격 낮은순</option>
            <option value="price_desc">가격 높은순</option>
          </select>
          <select id="pageSizeSelect" class="filter-pill mono" style="cursor:pointer;">
      <option value="10">10개씩</option>
            <option value="20" selected>20개씩</option>
            <option value="50">50개씩</option>
            <option value="100">100개씩</option>
          </select>
        </div>

        <p class="count-line">
          <span id="countText">전체 0건</span>
          <span>단가는 부가가치세 포함 · 계약가 기준 · 담기를 누르면 현재 선택된 공간에 추가됩니다</span>
        </p>

        <div class="grid" id="grid"></div>
        <div class="pagination" id="pagination"></div>

      </div>

      <div class="layout-right">
        <div id="printArea">

function cloudinaryFallbackUrl(g2b){
    if(!g2b) return "";
  return "https://res.cloudinary.com/" + CLOUDINARY_CLOUD_NAME + "/image/upload/f_auto,q_auto/" + encodeURIComponent(g2b) + ".jpg";

function productImgCandidates(p){
    var list = [];
  if(p.img) list.push(p.img);
  var fb = cloudinaryFallbackUrl(p.g2b);

function fillThumbWithFallback(thumbEl, candidates){
    if(!candidates || candidates.length === 0){ thumbEl.innerHTML = IMG_ICON; return; }
  var idx = 0;
  var imgEl = document.createElement('img');
  imgEl.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  imgEl.onerror = function(){
    idx++;
    if(idx < candidates.length){ imgEl.src = candidates[idx]; }

  };
  imgEl.src = candidates[idx];
  thumbEl.innerHTML = '';

}

    badges.push({text:text, type:type});
  }
  add(p.entrprsDivNm, 'div');
  if(p.exclncPrcrmntPrdctYn === 'Y') add('우수조달', 'excl');

});

function visibleProducts(){
    return PRODUCTS.filter(function(p){
          var matchCat = state.filter === "전체" || p.cat === state.filter;
    var q = state.query.trim().toLowerCase();
    var matchQ = q === "" ||
      p.name.toLowerCase().indexOf(q) > -1 ||
      p.code.toLowerCase().indexOf(q) > -1 ||
      p.g2b.toLowerCase().indexOf(q) > -1 ||
      p.spec.toLowerCase().indexOf(q) > -1;
    var matchCert = true;
    if(state.certFilter !== "전체"){
      var cf = CERT_FILTERS.filter(function(c){ return c.key === state.certFilter; })[0];
      matchCert = cf ? cf.test(p) : true;
    }
    return matchCat && matchQ && matchCert;
    }).sort(function(a, b){
          if(state.sort === "price_asc") return a.price - b.price;

function renderPagination(totalItems){

  if(totalItems === 0){ wrap.innerHTML = ''; return; }

        '<button id="pgFirst">« 처음</button>' +
        '<button id="pgPrev">‹ 이전</button>' +
        '<span><input id="pgJumpInput" class="mono" type="number" min="1" max="' + totalPages + '" value="' + state.page + '" style="width:50px;padding:6px;border:1.5px solid var(--ink);font-family:\'IBM Plex Mono\',monospace;text-align:center;"> / ' + totalPages + ' 페이지</span>' +

        '<button id="pgLast">끝 »</button>';
      document.getElementById('pgFirst').disabled = state.page <= 1;

  document.getElementById('pgLast').disabled = state.page >= totalPages;
  document.getElementById('pgFirst').onclick = function(){ state.page = 1; renderGrid(); window.scrollTo({top:0, behavior:'smooth'}); };
  document.getElementById('pgPrev').onclick = function(){ state.page = Math.max(1, state.page - 1); renderGrid(); window.scrollTo({top:0, behavior:'smooth'}); };
  document.getElementById('pgNext').onclick = function(){ state.page = Math.min(totalPages, state.page + 1); renderGrid(); window.scrollTo({top:0, behavior:'smooth'}); };
  document.getElementById('pgLast').onclick = function(){ state.page = totalPages; renderGrid(); window.scrollTo({top:0, behavior:'smooth'}); };
  var jumpInput = document.getElementById('pgJumpInput');

        var n = parseInt(jumpInput.value, 10);
    if(!n || n < 1) n = 1;
    if(n > totalPages) n = totalPages;
    state.page = n;
    renderGrid();
    window.scrollTo({top:0, behavior:'smooth'});
  }
  jumpInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') doJump(); });

}

function requestRemoveRoom(id){
    var room = findRoom(id);
  var hasItems = room && Object.keys(room.items).length > 0;
  if(!hasItems){ removeRoom(id); return; }
  if(pendingRemoveRoomId === id){
    clearTimeout(pendingRemoveTimer);
    pendingRemoveRoomId = null;
    removeRoom(id);
    return;
  }
  pendingRemoveRoomId = id;
  showToast('담긴 품목이 있습니다 · 정말 삭제하려면 다시 클릭하세요');
  clearTimeout(pendingRemoveTimer);
  pendingRemoveTimer = setTimeout(function(){ pendingRemoveRoomId = null; renderRoomChips(); }, 3000);
  renderRoomChips();
}

function removeRoom(id){
    state.rooms = state.rooms.filter(function(r){ return r.id !== id; });
  if(state.activeRoomId === id){
    state.activeRoomId = state.rooms.length ? state.rooms[0].id : null;
  }
  render();
}

  document.getElementById('newFloor').value = '';

function addToCart(code){
    var room = findRoom(state.activeRoomId);
  if(!room){ showToast('먼저 공간을 추가/선택해주세요'); return; }
  if(!room.items[code]) room.items[code] = 0;
  room.items[code] += 1;
  showToast(room.floor + ' ' + room.name + '에 담았습니다');
  renderQuote();
}

function changeQty(roomId, code, delta){
    var room = findRoom(roomId);
  if(!room || !room.items[code]) return;
  room.items[code] += delta;
  if(room.items[code] <= 0) delete room.items[code];
  renderQuote();
}

function setQty(roomId, code, value){
    var room = findRoom(roomId);
  if(!room || !room.items[code]) return;
  var n = parseInt(value, 10);
  if(!n || n <= 0){ delete room.items[code]; }
  else { room.items[code] = n; }
  renderQuote();
}

function removeItem(roomId, code){
    var room = findRoom(roomId);
  if(!room) return;
  delete room.items[code];
  renderQuote();
}

            var floorTotal = 0, floorHasRows = false;
      var floorRoomsHtml = '';

      state.rooms.filter(function(r){ return r.floor === floor; }).forEach(function(room){
                var codes = Object.keys(room.items);
        var roomTotal = 0;
        var roomHtml = '<tr class="grp-room"><td colspan="9">' + room.name + '</td></tr>';

        if(codes.length === 0){
          roomHtml += '<tr><td colspan="9" style="color:var(--ink-3);font-size:12px;padding:8px;">담긴 품목 없음</td></tr>';
        } else {
          roomsWithItems++;
          codes.forEach(function(code){
                        var p = findProduct(code);
            var qty = room.items[code];
            var lineTotal = p.price * qty;
            roomTotal += lineTotal;
            grandQty += qty;
            roomHtml +=
                            '<tr data-room-id="' + room.id + '" data-code="' + code + '">' +
                              '<td class="row-code">' + p.code + '</td>' +
                              '<td><div class="row-thumb" data-thumb-code="' + code + '">' + IMG_ICON + '</div></td>' +
                              '<td>' + p.name + '</td>' +
                              '<td class="mono col-spec" style="font-size:11px;color:var(--ink-3);">' + p.spec + '</td>' +
                              '<td><div class="qty-ctrl"><button data-a="-1">−</button><input class="qty-input mono" type="number" min="1" value="' + qty + '" style="width:40px;text-align:center;border:1px solid var(--line);font-family:\'IBM Plex Mono\',monospace;font-size:11.5px;padding:2px;"><button data-a="1">+</button></div></td>' +
                              '<td class="row-price">' + fmt(p.price) + '</td>' +
                              '<td class="row-total">' + fmt(lineTotal) + '</td>' +
                              '<td class="row-g2b col-g2b">' + p.g2b + '</td>' +
                              '<td><button class="row-remove">삭제</button></td>' +
                            '</tr>';
              });
              }
                      roomHtml += '<tr class="subtot-room"><td colspan="9">' + room.name + ' 소계 &nbsp; ' + fmt(roomTotal) + '</td></tr>';
        floorTotal += roomTotal;
        floorHasRows = true;
        floorRoomsHtml += roomHtml;
        });

      html += '<tr class="grp-floor"><td colspan="9">' + floor + '</td></tr>';
      html += floorRoomsHtml;
      html += '<tr class="subtot-floor"><td colspan="9">' + floor + ' 합계 &nbsp; ' + fmt(floorTotal) + '</td></tr>';
      grandTotal += floorTotal;
      });

    html += '<tr class="grand-total"><td colspan="9">총 합계 &nbsp; ' + fmt(grandTotal) + '</td></tr>';
    html += '</tbody></table>';
    wrap.innerHTML = html;

    wrap.querySelectorAll('[data-thumb-code]').forEach(function(thumbEl){
            var p = findProduct(thumbEl.getAttribute('data-thumb-code'));
      if(p) fillThumbWithFallback(thumbEl, productImgCandidates(p));
    });

    wrap.querySelectorAll('.qty-ctrl button').forEach(function(btn){
            btn.onclick = function(){
        var row = btn.closest('tr');
        var roomId = row.getAttribute('data-room-id');
        var code = row.getAttribute('data-code');
        if(roomId) changeQty(roomId, code, parseInt(btn.getAttribute('data-a'),10));
            };
    });
    wrap.querySelectorAll('.qty-input').forEach(function(inp){
            var row = inp.closest('tr');
      var roomId = row.getAttribute('data-room-id');
      var code = row.getAttribute('data-code');
      function commit(){ setQty(roomId, code, inp.value); }
      inp.addEventListener('keydown', function(e){ if(e.key === 'Enter') commit(); });
      inp.addEventListener('blur', commit);
    });
    wrap.querySelectorAll('.row-remove').forEach(function(btn){
            btn.onclick = function(){
        var row = btn.closest('tr');
        var roomId = row.getAttribute('data-room-id');
        var code = row.getAttribute('data-code');
        if(roomId) removeItem(roomId, code);
            };
    });
    }

  document.getElementById('statRooms').textContent = state.rooms.length;
  document.getElementById('statQty').textContent = grandQty;
  document.getElementById('statTotal').textContent = fmt(grandTotal);
  }

var toastTimer = null;
function showToast(msg){
    var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1700);
}

document.getElementById('searchInput').addEventListener('input', function(e){
    state.query = e.target.value;
  state.page = 1;
  renderGrid();
});

document.getElementById('pageSizeSelect').addEventListener('change', function(e){
    state.pageSize = parseInt(e.target.value, 10) || 20;
  state.page = 1;
  renderGrid();
});

document.getElementById('certFilterSelect').addEventListener('change', function(e){
    state.certFilter = e.target.value;
  state.page = 1;
  renderGrid();
});

document.getElementById('sortSelect').addEventListener('change', function(e){
    state.sort = e.target.value;
  state.page = 1;
  renderGrid();
});

document.getElementById('printBtn').addEventListener('click', function(){
    var building = document.getElementById('buildingInput').value.trim() || '-';
  var today = new Date();
  var dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');
  document.getElementById('printMeta').textContent = building + ' · 견적일자 ' + dateStr;
  window.print();
});

function render(){
    renderFilters();
  renderGrid();
  renderRoomChips();
  renderQuote();
}

loadProducts();
</script>

  <script>
  var adminAuthed = false;
var adminUserEmail = null;
var lastLoadedAt = null;
var lastLoadOk = null;
var currentLockState = null;

var adminOverlay = document.getElementById('adminOverlay');
var adminPanel = document.getElementById('adminPanel');

function setupNeededHtml(){
    return '<h3>설정이 필요합니다</h3>' +
          '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:11.5px;color:var(--ink-3);line-height:1.7;margin:0;">' +
          '관리자 로그인을 쓰려면 먼저 코드 상단의 FIREBASE_CONFIG 값을 채워야 합니다. (Firebase 콘솔에서 프로젝트를 만들고 웹 앱을 등록하면 나오는 값입니다.)' +
          '</p>';
      }

function loginScreenHtml(){
    return '<h3>관리자 로그인</h3>' +
          '<div class="admin-pin-row" style="flex-direction:column;align-items:stretch;">' +
            '<input type="email" id="adminEmailInput" placeholder="이메일" style="margin-bottom:8px;padding:10px 12px;border:1.5px solid var(--ink);font-family:\'IBM Plex Mono\',monospace;font-size:13px;outline:none;">' +
            '<input type="password" id="adminPwInput" placeholder="비밀번호" style="padding:10px 12px;border:1.5px solid var(--ink);font-family:\'IBM Plex Mono\',monospace;font-size:13px;outline:none;">' +
          '</div>' +
          '<button class="admin-btn wide" id="adminLoginSubmit">로그인</button>' +
          '<p style="text-align:right;margin:8px 0 0;"><a href="#" id="adminForgotPw" style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--ink-3);">비밀번호를 잊으셨나요?</a></p>';
      }

function statsHtml(){
    var withImg = PRODUCTS.filter(function(p){ return !!p.img; }).length;
  var updated = lastLoadedAt ? lastLoadedAt.toLocaleString('ko-KR') : '-';
  var statusText = lastLoadOk === false ? '실패 (샘플 데이터 표시 중)' : (lastLoadOk === true ? '정상' : '-');
  var locked = currentLockState && currentLockState.locked;
  return '<h3>관리자 패널</h3>' +
        '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:10.5px;color:var(--ink-3);margin:-8px 0 12px;">' + (adminUserEmail || '') + ' 로 로그인됨 · <a href="#" id="adminLogout" style="color:var(--rust);">로그아웃</a></p>' +
        '<div class="admin-stats">' +
          '<div class="admin-stat-row"><span>전체 품목 수</span><b>' + PRODUCTS.length.toLocaleString('ko-KR') + '건</b></div>' +
          '<div class="admin-stat-row"><span>이미지 보유 품목</span><b>' + withImg.toLocaleString('ko-KR') + '건</b></div>' +
          '<div class="admin-stat-row"><span>마지막 업데이트</span><b>' + updated + '</b></div>' +
          '<div class="admin-stat-row"><span>최근 로드 상태</span><b>' + statusText + '</b></div>' +
          '<div class="admin-stat-row"><span>사이트 상태</span><b style="color:' + (locked ? 'var(--rust)' : 'var(--teal)') + ';">' + (locked ? '사용중지됨' : '정상 운영중') + '</b></div>' +
        '</div>' +
        '<button class="admin-btn wide" id="adminRefreshBtn">최신 데이터로 업데이트</button>' +
        '<button class="admin-btn wide" id="adminLockToggleBtn" style="background:' + (locked ? 'var(--teal)' : 'var(--rust)') + ';">' + (locked ? '사용 재개' : '사용 중지') + '</button>' +
        '<div class="admin-url">DATA_URL<br>' + (DATA_URL || '(설정 안 됨 · 샘플 데이터 사용 중)') + '</div>';
    }

function refreshLockStateThenRender(){
    if(!lockDocRef){ renderAdminBody(); return; }
  lockDocRef.get().then(function(doc){
        currentLockState = doc.exists ? doc.data() : {locked:false};
    renderAdminBody();
  }).catch(function(){
    currentLockState = null;
    renderAdminBody();
  });
}

function renderAdminBody(){
    var body;
  if(!FIREBASE_READY){ body = setupNeededHtml(); }
  else if(!adminAuthed){ body = loginScreenHtml(); }
  else { body = statsHtml(); }
  adminPanel.innerHTML = '<button class="admin-close" id="adminClose">✕</button>' + body;
  document.getElementById('adminClose').onclick = closeAdminPanel;

  if(FIREBASE_READY && !adminAuthed){
    var emailInput = document.getElementById('adminEmailInput');
    var pwInput = document.getElementById('adminPwInput');
    var submit = document.getElementById('adminLoginSubmit');
    var tryLogin = function(){
      submit.disabled = true;
      submit.textContent = '로그인 중...';
      fbAuth.signInWithEmailAndPassword(emailInput.value.trim(), pwInput.value)
                .catch(function(err){
                  showToast('로그인 실패: ' + (err && err.message ? err.message : '이메일/비밀번호를 확인해주세요'));
                  submit.disabled = false;
          submit.textContent = '로그인';
    });
  };
    submit.onclick = tryLogin;
    pwInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') tryLogin(); });

    document.getElementById('adminForgotPw').onclick = function(e){
      e.preventDefault();
      var email = emailInput.value.trim();
      if(!email){ showToast('먼저 이메일을 입력해주세요'); return; }
      fbAuth.sendPasswordResetEmail(email).then(function(){
                showToast(email + ' 로 비밀번호 재설정 메일을 보냈습니다');
      }).catch(function(err){
        showToast('메일 발송 실패: ' + (err && err.message ? err.message : ''));
});
};
}

  if(FIREBASE_READY && adminAuthed){
    document.getElementById('adminLogout').onclick = function(e){
      e.preventDefault();
      fbAuth.signOut();
};
    document.getElementById('adminRefreshBtn').onclick = function(){
      var btn = document.getElementById('adminRefreshBtn');
      btn.disabled = true;
      btn.textContent = '업데이트 중...';
      loadProducts(function(ok){
        renderAdminBody();
        showToast(ok ? '최신 데이터로 업데이트했습니다' : '업데이트 실패 · 샘플 데이터로 표시 중');
});
};
    document.getElementById('adminLockToggleBtn').onclick = function(){
      var willLock = !(currentLockState && currentLockState.locked);
      var btn = document.getElementById('adminLockToggleBtn');
      btn.disabled = true;
      lockDocRef.set({
        locked: willLock,
        message: '현재 시스템 점검 중입니다. 잠시 후 다시 이용해주세요.',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: adminUserEmail || ''
}, {merge:true}).then(function(){
        currentLockState = {locked: willLock};
        renderAdminBody();
        showToast(willLock ? '사이트를 사용중지 상태로 전환했습니다' : '사이트를 다시 사용 가능하게 전환했습니다');
}).catch(function(err){
        showToast('처리 실패: ' + (err && err.message ? err.message : ''));
        btn.disabled = false;
});
};
}
}

function openAdminPanel(){
  if(FIREBASE_READY && adminAuthed){
    refreshLockStateThenRender();
} else {
    renderAdminBody();
}
  adminOverlay.classList.add('show');
}
function closeAdminPanel(){
  adminOverlay.classList.remove('show');
}

if(FIREBASE_READY){
  fbAuth.onAuthStateChanged(function(user){
    adminAuthed = !!user;
    adminUserEmail = user ? user.email : null;
    if(adminOverlay.classList.contains('show')){
      if(adminAuthed){ refreshLockStateThenRender(); } else { renderAdminBody(); }
}
});
}

document.getElementById('adminTrigger').addEventListener('click', openAdminPanel);
adminOverlay.addEventListener('click', function(e){ if(e.target === adminOverlay) closeAdminPanel(); });
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeAdminPanel(); });
</script>

</body>
